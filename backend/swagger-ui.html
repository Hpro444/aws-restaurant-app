<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant API Docs</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fafafa;
      }

      .topbar {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.OPENAPI_SPEC = {
        "openapi": "3.0.3",
        "info": {
          "title": "Restaurant App API",
          "version": "1.0.0",
          "description": "OpenAPI documentation generated from the Lambda handler routes and DTO contracts."
        },
        "servers": [
          {
            "url": "https://{apiId}.execute-api.{region}.amazonaws.com/api",
            "description": "AWS API Gateway",
            "variables": {
              "apiId": {
                "default": "your-api-id"
              },
              "region": {
                "default": "eu-west-3"
              }
            }
          }
        ],
        "tags": [
          {
            "name": "Auth"
          },
          {
            "name": "Users"
          },
          {
            "name": "Locations"
          },
          {
            "name": "Bookings"
          },
          {
            "name": "Dishes"
          },
          {
            "name": "Feedback"
          }
        ],
        "paths": {
          "/auth/sign-up": {
            "post": {
              "tags": ["Auth"],
              "summary": "Register a new user",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/SignUpRequest" }
                  }
                }
              },
              "responses": {
                "201": {
                  "description": "User created",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/SignUpResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/sign-in": {
            "post": {
              "tags": ["Auth"],
              "summary": "Authenticate user",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/SignInRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Authenticated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/SignInResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "423": {
                  "description": "User locked due to failed attempts",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ErrorBody" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/refresh": {
            "post": {
              "tags": ["Auth"],
              "summary": "Refresh access token",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/RefreshRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Token refreshed",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/RefreshResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/logout": {
            "post": {
              "tags": ["Auth"],
              "summary": "Revoke refresh token",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/LogoutRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Logged out",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/LogoutResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/users/profile": {
            "get": {
              "tags": ["Users"],
              "summary": "Get current user profile",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Profile",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ProfileResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" }
              }
            },
            "put": {
              "tags": ["Users"],
              "summary": "Update current user profile",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/UpdateProfileRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Profile updated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ProfileResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/locations": {
            "get": {
              "tags": ["Locations"],
              "summary": "List all locations",
              "responses": {
                "200": {
                  "description": "Locations list",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/LocationResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/select-options": {
            "get": {
              "tags": ["Locations"],
              "summary": "List compact location options",
              "responses": {
                "200": {
                  "description": "Location options",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/LocationAddressResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/{id}": {
            "get": {
              "tags": ["Locations"],
              "summary": "Get location by ID",
              "parameters": [
                {
                  "name": "id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                }
              ],
              "responses": {
                "200": {
                  "description": "Location",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/LocationResponse" }
                    }
                  }
                },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/tables": {
            "get": {
              "tags": ["Bookings"],
              "summary": "Find available tables",
              "parameters": [
                { "name": "location_id", "in": "query", "required": true, "schema": { "type": "string", "format": "uuid" } },
                { "name": "date", "in": "query", "required": true, "schema": { "type": "string", "format": "date" }, "example": "2026-05-30" },
                { "name": "guests_number", "in": "query", "required": true, "schema": { "type": "integer", "minimum": 1, "maximum": 10 } },
                { "name": "from_time", "in": "query", "required": false, "schema": { "type": "string", "pattern": "^([01]\\d|2[0-3]):[0-5]\\d$" }, "example": "18:30", "description": "Optional start time filter in HH:MM. Alias `from` is also accepted by backend." }
              ],
              "responses": {
                "200": {
                  "description": "Available tables",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/AvailableTablesResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/client": {
            "post": {
              "tags": ["Bookings"],
              "summary": "Create booking (customer only)",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/CreateBookingRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Booking created",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/CreateBookingResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "409": { "$ref": "#/components/responses/ConflictError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            },
            "get": {
              "tags": ["Bookings"],
              "summary": "List dashboard bookings",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Reservations list",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationListResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" }
              }
            }
          },
          "/bookings/client/{id}": {
            "get": {
              "tags": ["Bookings"],
              "summary": "Get booking by ID",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                { "name": "id", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" }, "description": "Reservation identifier" }
              ],
              "responses": {
                "200": {
                  "description": "Reservation",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            },
            "put": {
              "tags": ["Bookings"],
              "summary": "Update booking",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                { "name": "id", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }
              ],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/UpdateReservationRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Reservation updated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/client/{id}/cancel": {
            "delete": {
              "tags": ["Bookings"],
              "summary": "Cancel booking",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                { "name": "id", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }
              ],
              "responses": {
                "200": {
                  "description": "Reservation cancelled",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/dishes/popular": {
            "get": {
              "tags": ["Dishes"],
              "summary": "Get all popular dishes",
              "responses": {
                "200": {
                  "description": "Popular dishes",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/DishResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/{id}/speciality-dishes": {
            "get": {
              "tags": ["Dishes"],
              "summary": "Get speciality dishes by location",
              "parameters": [
                { "name": "id", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } }
              ],
              "responses": {
                "200": {
                  "description": "Speciality dishes",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/DishResponse" }
                      }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/locations/{id}/feedbacks": {
            "get": {
              "tags": ["Feedback"],
              "summary": "Get location feedbacks with pagination and sorting",
              "parameters": [
                { "name": "id", "in": "path", "required": true, "schema": { "type": "string", "format": "uuid" } },
                { "name": "type", "in": "query", "required": true, "schema": { "type": "string", "enum": ["cuisine", "service"] } },
                { "name": "sort", "in": "query", "required": false, "schema": { "type": "string", "example": "date,desc" }, "description": "Sort by `date` or `rate` with `asc`/`desc` direction." },
                {
                  "name": "page",
                  "in": "query",
                  "required": false,
                  "schema": { "type": "integer", "minimum": 0, "default": 0 },
                  "description": "Zero-based page index. Must be between 0 and totalPages-1; out-of-range values return 422."
                },
                { "name": "size", "in": "query", "required": false, "schema": { "type": "integer", "minimum": 1, "maximum": 100, "default": 20 } }
              ],
              "responses": {
                "200": {
                  "description": "Feedback page",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/PageFeedbackResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          }
        },
        "components": {
          "securitySchemes": {
            "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "JWT" }
          },
          "responses": {
            "UnauthorizedError": {
              "description": "Unauthorized",
              "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorBody" } } }
            },
            "ForbiddenError": {
              "description": "Forbidden",
              "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorBody" } } }
            },
            "NotFoundError": {
              "description": "Not found",
              "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorBody" } } }
            },
            "ConflictError": {
              "description": "Conflict",
              "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorBody" } } }
            },
            "ValidationError": {
              "description": "Validation error",
              "content": {
                "application/json": {
                  "schema": {
                    "oneOf": [
                      { "$ref": "#/components/schemas/ValidationErrorResponse" },
                      {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/FieldError" }
                      }
                    ]
                  }
                }
              }
            }
          },
          "schemas": {
            "ErrorBody": {
              "description": "Backend returns a structured error body (message object and/or field errors).",
              "oneOf": [
                { "type": "object", "required": ["message"], "properties": { "message": { "type": "string" } }, "additionalProperties": true },
                { "type": "array", "items": { "$ref": "#/components/schemas/FieldError" } },
                { "type": "object", "additionalProperties": true }
              ]
            },
            "FieldError": {
              "type": "object",
              "required": ["field", "message"],
              "properties": { "field": { "type": "string" }, "message": { "type": "string" } }
            },
            "ValidationErrorResponse": {
              "type": "object",
              "required": ["errors"],
              "properties": { "errors": { "type": "array", "items": { "$ref": "#/components/schemas/FieldError" } } }
            },
            "SignUpRequest": {
              "type": "object",
              "required": ["firstName", "lastName", "email", "password"],
              "properties": {
                "firstName": { "type": "string", "minLength": 1, "maxLength": 100 },
                "lastName": { "type": "string", "minLength": 1, "maxLength": 100 },
                "email": { "type": "string", "format": "email" },
                "password": { "type": "string", "format": "password", "description": "8-16 chars, includes uppercase, lowercase, digit, and special character" }
              }
            },
            "SignUpResponse": {
              "type": "object",
              "required": ["message"],
              "properties": { "message": { "type": "string" } }
            },
            "SignInRequest": {
              "type": "object",
              "required": ["email", "password"],
              "properties": { "email": { "type": "string", "format": "email" }, "password": { "type": "string", "format": "password" } }
            },
            "SignInResponse": {
              "type": "object",
              "required": ["access_token", "refresh_token", "username", "role"],
              "properties": { "access_token": { "type": "string" }, "refresh_token": { "type": "string" }, "username": { "type": "string" }, "role": { "type": "string" } }
            },
            "RefreshRequest": { "type": "object", "required": ["refresh_token"], "properties": { "refresh_token": { "type": "string" } } },
            "RefreshResponse": { "type": "object", "required": ["access_token"], "properties": { "access_token": { "type": "string" } } },
            "LogoutRequest": { "type": "object", "required": ["refresh_token"], "properties": { "refresh_token": { "type": "string" } } },
            "LogoutResponse": { "type": "object", "required": ["message"], "properties": { "message": { "type": "string" } } },
            "ProfileResponse": {
              "type": "object",
              "required": ["first_name", "last_name", "image_url", "email", "role"],
              "properties": { "first_name": { "type": "string" }, "last_name": { "type": "string" }, "image_url": { "type": "string" }, "email": { "type": "string", "format": "email" }, "role": { "type": "string" } }
            },
            "UpdateProfileRequest": { "type": "object", "required": ["first_name", "last_name", "image_url"], "properties": { "first_name": { "type": "string" }, "last_name": { "type": "string" }, "image_url": { "type": "string" } } },
            "LocationResponse": { "type": "object", "required": ["id", "address", "description", "total_capacity", "average_occupancy", "image_url", "rating"], "properties": { "id": { "type": "string", "format": "uuid" }, "address": { "type": "string" }, "description": { "type": "string" }, "total_capacity": { "type": "integer" }, "average_occupancy": { "type": "integer" }, "image_url": { "type": "string" }, "rating": { "type": "number", "format": "float" } } },
            "LocationAddressResponse": { "type": "object", "required": ["location_id", "location_address"], "properties": { "location_id": { "type": "string", "format": "uuid" }, "location_address": { "type": "string" } } },
            "SlotResponse": { "type": "object", "required": ["slot_id", "start_time", "end_time"], "properties": { "slot_id": { "type": "string", "format": "uuid" }, "start_time": { "type": "string", "example": "18:00" }, "end_time": { "type": "string", "example": "19:30" } } },
            "TableAvailabilityResponse": { "type": "object", "required": ["table_id", "table_number", "capacity", "available_slots"], "properties": { "table_id": { "type": "string", "format": "uuid" }, "table_number": { "type": "integer" }, "capacity": { "type": "integer" }, "location_address": { "type": "string", "nullable": true }, "available_slots": { "type": "array", "items": { "$ref": "#/components/schemas/SlotResponse" } } } },
            "AvailableTablesResponse": { "type": "object", "required": ["tables"], "properties": { "tables": { "type": "array", "items": { "$ref": "#/components/schemas/TableAvailabilityResponse" } } } },
            "CreateBookingRequest": { "type": "object", "required": ["locationId", "tableNumber", "date", "guestsNumber", "timeFrom", "timeTo"], "properties": { "locationId": { "type": "string", "format": "uuid" }, "tableNumber": { "type": "integer", "minimum": 1 }, "date": { "type": "string", "format": "date" }, "guestsNumber": { "type": "integer", "minimum": 1, "maximum": 10 }, "timeFrom": { "type": "string", "pattern": "^([01]\\d|2[0-3]):[0-5]\\d$" }, "timeTo": { "type": "string", "pattern": "^([01]\\d|2[0-3]):[0-5]\\d$" } } },
            "CreateBookingResponse": { "type": "object", "required": ["reservationId", "status", "locationId", "location_address", "tableNumber", "date", "timeFrom", "timeTo", "guestsNumber"], "properties": { "reservationId": { "type": "string", "format": "uuid" }, "status": { "type": "string", "enum": ["RESERVED", "IN_PROGRESS", "CANCELLED", "FINISHED"] }, "locationId": { "type": "string", "format": "uuid" }, "location_address": { "type": "string" }, "tableNumber": { "type": "integer" }, "date": { "type": "string", "format": "date" }, "timeFrom": { "type": "string" }, "timeTo": { "type": "string" }, "guestsNumber": { "type": "integer" } } },
            "AllowedActions": { "type": "object", "required": ["canEdit", "canCancel"], "properties": { "canEdit": { "type": "boolean" }, "canCancel": { "type": "boolean" } } },
            "ReservationView": { "type": "object", "required": ["reservationId", "status", "date", "timeFrom", "timeTo", "guestsNumber", "allowedActions"], "properties": { "reservationId": { "type": "string", "format": "uuid" }, "status": { "type": "string", "enum": ["RESERVED", "IN_PROGRESS", "CANCELLED", "FINISHED"] }, "customerId": { "type": "string", "format": "uuid", "nullable": true }, "waiterId": { "type": "string", "format": "uuid", "nullable": true }, "locationId": { "type": "string", "format": "uuid", "nullable": true }, "location_address": { "type": "string", "nullable": true }, "tableNumber": { "type": "integer", "nullable": true }, "date": { "type": "string", "format": "date" }, "timeFrom": { "type": "string" }, "timeTo": { "type": "string" }, "guestsNumber": { "type": "integer" }, "allowedActions": { "$ref": "#/components/schemas/AllowedActions" }, "cutoffReason": { "type": "string", "nullable": true } } },
            "ReservationListResponse": { "type": "object", "required": ["reservations"], "properties": { "reservations": { "type": "array", "items": { "$ref": "#/components/schemas/ReservationView" } } } },
            "UpdateReservationRequest": { "type": "object", "description": "At least one of guestsNumber or status must be present.", "properties": { "guestsNumber": { "type": "integer", "minimum": 1, "maximum": 10 }, "status": { "type": "string", "enum": ["RESERVED", "IN_PROGRESS", "CANCELLED", "FINISHED"] } }, "anyOf": [{ "required": ["guestsNumber"] }, { "required": ["status"] }] },
            "DishResponse": { "type": "object", "required": ["name", "image_url", "price", "weight_gram"], "properties": { "name": { "type": "string" }, "image_url": { "type": "string" }, "price": { "type": "number", "format": "float" }, "weight_gram": { "type": "integer" } } },
