<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant API Docs</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fafafa;
      }

      .topbar {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.OPENAPI_SPEC = {
        "openapi": "3.0.3",
        "info": {
          "title": "Restaurant App API",
          "version": "1.1.0",
          "description": "OpenAPI documentation synchronized with ApiHandler routes and DTO contracts."
        },
        "servers": [
          {
            "url": "https://{apiId}.execute-api.{region}.amazonaws.com/api",
            "description": "AWS API Gateway",
            "variables": {
              "apiId": { "default": "your-api-id" },
              "region": { "default": "eu-west-3" }
            }
          }
        ],
        "tags": [
          { "name": "Auth" },
          { "name": "Users" },
          { "name": "Locations" },
          { "name": "Bookings" },
          { "name": "Dishes" },
          { "name": "Feedback" },
          { "name": "Customers" },
          { "name": "Reservations" }
        ],
        "paths": {
          "/auth/sign-up": {
            "post": {
              "tags": ["Auth"],
              "summary": "Register a new user",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/SignUpRequest" }
                  }
                }
              },
              "responses": {
                "201": {
                  "description": "User created",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/SignUpResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/sign-in": {
            "post": {
              "tags": ["Auth"],
              "summary": "Authenticate user",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/SignInRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Authenticated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/SignInResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "423": {
                  "description": "User locked due to failed attempts",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ErrorBody" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/refresh": {
            "post": {
              "tags": ["Auth"],
              "summary": "Refresh access token",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/RefreshRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Token refreshed",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/RefreshResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/auth/logout": {
            "post": {
              "tags": ["Auth"],
              "summary": "Revoke refresh token",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/LogoutRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Logged out",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/LogoutResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/users/profile": {
            "get": {
              "tags": ["Users"],
              "summary": "Get current user profile",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Profile",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ProfileResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" }
              }
            },
            "put": {
              "tags": ["Users"],
              "summary": "Update current user profile",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/UpdateProfileRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Profile updated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ProfileResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/customers": {
            "get": {
              "tags": ["Users"],
              "summary": "List all customers (waiter only)",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Customers list",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/CustomerResponse" }
                      }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" }
              }
            }
          },
          "/locations": {
            "get": {
              "tags": ["Locations"],
              "summary": "List all locations",
              "responses": {
                "200": {
                  "description": "Locations list",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/LocationResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/select-options": {
            "get": {
              "tags": ["Locations"],
              "summary": "List compact location options",
              "responses": {
                "200": {
                  "description": "Location options",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/LocationAddressResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/{id}": {
            "get": {
              "tags": ["Locations"],
              "summary": "Get location by ID",
              "parameters": [
                {
                  "name": "id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                }
              ],
              "responses": {
                "200": {
                  "description": "Location",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/LocationResponse" }
                    }
                  }
                },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/tables": {
            "get": {
              "tags": ["Bookings"],
              "summary": "Find available tables",
              "parameters": [
                {
                  "name": "location_id",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                },
                {
                  "name": "date",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "format": "date" },
                  "example": "2026-05-30"
                },
                {
                  "name": "guests_number",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "integer", "minimum": 1, "maximum": 10 }
                },
                {
                  "name": "from_time",
                  "in": "query",
                  "required": false,
                  "schema": {
                    "type": "string",
                    "format": "date-time",
                    "example": "2026-05-27T11:45:00Z"
                  },
                  "description": "Optional UTC ISO datetime. Must use Z/+00:00 and match the date parameter."
                }
              ],
              "responses": {
                "200": {
                  "description": "Available tables",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/AvailableTablesResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/client": {
            "post": {
              "tags": ["Bookings"],
              "summary": "Create booking (customer only)",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/CreateBookingRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Booking created",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/CreateBookingResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "409": { "$ref": "#/components/responses/ConflictError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            },
            "get": {
              "tags": ["Bookings"],
              "summary": "List dashboard bookings",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Reservations list",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationListResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" }
              }
            }
          },
          "/bookings/client/{reservation_id}": {
            "get": {
              "tags": ["Bookings"],
              "summary": "Get booking by ID",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                {
                  "name": "reservation_id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" },
                  "description": "Reservation identifier"
                }
              ],
              "responses": {
                "200": {
                  "description": "Reservation",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            },
            "put": {
              "tags": ["Bookings"],
              "summary": "Update booking",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                {
                  "name": "reservation_id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                }
              ],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/UpdateReservationRequest" }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Reservation updated",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/bookings/client/{reservation_id}/cancel": {
            "delete": {
              "tags": ["Bookings"],
              "summary": "Cancel booking",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                {
                  "name": "reservation_id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                }
              ],
              "responses": {
                "200": {
                  "description": "Reservation cancelled",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/ReservationView" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/dishes": {
            "get": {
              "tags": ["Dishes"],
              "summary": "Get dishes with optional filters",
              "parameters": [
                {
                  "name": "dishType",
                  "in": "query",
                  "required": false,
                  "schema": {
                    "type": "string",
                    "enum": ["APPETIZER", "DESSERT", "MAIN_COURSE", "DRINK"]
                  }
                },
                {
                  "name": "sort",
                  "in": "query",
                  "required": false,
                  "schema": {
                    "type": "string",
                    "enum": [
                      "popularity,asc",
                      "popularity,desc",
                      "price,asc",
                      "price,desc"
                    ]
                  }
                },
                {
                  "name": "dietary_filter",
                  "in": "query",
                  "required": false,
                  "schema": {
                    "type": "string",
                    "enum": [
                      "VEGETARIAN",
                      "VEGAN",
                      "GLUTEN_FREE",
                      "DAIRY_FREE"
                    ]
                  },
                  "description": "Optional dietary filter matched against dish description tags."
                }
              ],
              "responses": {
                "200": {
                  "description": "Dishes list",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/DishResponse" }
                      }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/dishes/popular": {
            "get": {
              "tags": ["Dishes"],
              "summary": "Get all popular dishes",
              "responses": {
                "200": {
                  "description": "Popular dishes",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/DishResponse" }
                      }
                    }
                  }
                }
              }
            }
          },
          "/locations/{id}/speciality-dishes": {
            "get": {
              "tags": ["Dishes"],
              "summary": "Get speciality dishes by location",
              "parameters": [
                {
                  "name": "id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                }
              ],
              "responses": {
                "200": {
                  "description": "Speciality dishes",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/DishResponse" }
                      }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/locations/{id}/feedbacks": {
            "get": {
              "tags": ["Feedback"],
              "summary": "Get location feedbacks with pagination and sorting",
              "parameters": [
                {
                  "name": "id",
                  "in": "path",
                  "required": true,
                  "schema": { "type": "string", "format": "uuid" }
                },
                {
                  "name": "type",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "enum": ["cuisine", "service"] }
                },
                {
                  "name": "sort",
                  "in": "query",
                  "required": false,
                  "schema": { "type": "string", "example": "date,desc" },
                  "description": "Sort by date or rate using asc/desc, e.g. date,desc."
                },
                {
                  "name": "page",
                  "in": "query",
                  "required": false,
                  "schema": { "type": "integer", "minimum": 0, "default": 0 }
                },
                {
                  "name": "size",
                  "in": "query",
                  "required": false,
                  "schema": { "type": "integer", "minimum": 1, "maximum": 100, "default": 20 }
                }
              ],
              "responses": {
                "200": {
                  "description": "Feedback page",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/PageFeedbackResponse" }
                    }
                  }
                },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/feedbacks": {
            "post": {
              "tags": ["Feedback"],
              "summary": "Leave feedback (customer only)",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/LeaveFeedbackRequest" }
                  }
                }
              },
              "responses": {
                "201": {
                  "description": "Feedback created",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/LeaveFeedbackResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "404": { "$ref": "#/components/responses/NotFoundError" },
                "409": { "$ref": "#/components/responses/ConflictError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          },
          "/customers": {
            "get": {
              "tags": ["Customers"],
              "summary": "Get customers list (waiter only)",
              "security": [{ "bearerAuth": [] }],
              "responses": {
                "200": {
                  "description": "Customers list",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/CustomerResponse" }
                      }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" }
              }
            }
          },
          "/reservations/waiter": {
            "get": {
              "tags": ["Reservations"],
              "summary": "Get waiter reservations for a table and time",
              "security": [{ "bearerAuth": [] }],
              "parameters": [
                {
                  "name": "date",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "pattern": "^\\d{4}-\\d{2}-\\d{2}$" }
                },
                {
                  "name": "time_from",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "pattern": "^\\d{2}:\\d{2}$" }
                },
                {
                  "name": "table_name",
                  "in": "query",
                  "required": true,
                  "schema": { "type": "string", "minLength": 1 }
                }
              ],
              "responses": {
                "200": {
                  "description": "Waiter reservations",
                  "content": {
                    "application/json": {
                      "schema": { "$ref": "#/components/schemas/WaiterReservationListResponse" }
                    }
                  }
                },
                "401": { "$ref": "#/components/responses/UnauthorizedError" },
                "403": { "$ref": "#/components/responses/ForbiddenError" },
                "422": { "$ref": "#/components/responses/ValidationError" }
              }
            }
          }
        },
        "components": {
          "securitySchemes": {
            "bearerAuth": {
              "type": "http",
              "scheme": "bearer",
              "bearerFormat": "JWT"
            }
          },
          "responses": {
            "UnauthorizedError": {
              "description": "Unauthorized",
              "content": {
                "application/json": {
                  "schema": { "$ref": "#/components/schemas/ErrorBody" }
                }
              }
            },
            "ForbiddenError": {
              "description": "Forbidden",
              "content": {
                "application/json": {
                  "schema": { "$ref": "#/components/schemas/ErrorBody" }
                }
              }
            },
            "NotFoundError": {
              "description": "Not found",
              "content": {
                "application/json": {
                  "schema": { "$ref": "#/components/schemas/ErrorBody" }
                }
              }
            },
            "ConflictError": {
              "description": "Conflict",
              "content": {
                "application/json": {
                  "schema": { "$ref": "#/components/schemas/ErrorBody" }
                }
              }
            },
            "ValidationError": {
              "description": "Validation error",
              "content": {
                "application/json": {
                  "schema": {
                    "oneOf": [
                      { "$ref": "#/components/schemas/ValidationErrorResponse" },
                      {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/FieldError" }
                      }
                    ]
                  }
                }
              }
            }
          },
          "schemas": {
            "ErrorBody": {
              "description": "Backend can return either message objects, validation arrays, or generic objects.",
              "oneOf": [
                {
                  "type": "object",
                  "required": ["message"],
                  "properties": {
                    "message": { "type": "string" }
                  },
                  "additionalProperties": true
                },
                {
                  "type": "array",
                  "items": { "$ref": "#/components/schemas/FieldError" }
                },
                {
                  "type": "object",
                  "additionalProperties": true
                }
              ]
            },
            "FieldError": {
              "type": "object",
              "required": ["field", "message"],
              "properties": {
                "field": { "type": "string" },
                "message": { "type": "string" }
              }
            },
            "ValidationErrorResponse": {
              "type": "object",
              "required": ["errors"],
              "properties": {
                "errors": {
                  "type": "array",
                  "items": { "$ref": "#/components/schemas/FieldError" }
                }
              }
            },
            "SignUpRequest": {
              "type": "object",
              "required": ["firstName", "lastName", "email", "password"],
              "properties": {
                "firstName": { "type": "string", "minLength": 1, "maxLength": 100 },
                "lastName": { "type": "string", "minLength": 1, "maxLength": 100 },
                "email": { "type": "string", "format": "email" },
                "password": {
                  "type": "string",
                  "format": "password",
                  "description": "8-16 chars, includes uppercase, lowercase, digit, and special char"
                }
              }
            },
            "SignUpResponse": {
              "type": "object",
              "required": ["message"],
              "properties": {
                "message": { "type": "string" }
              }
            },
            "SignInRequest": {
              "type": "object",
              "required": ["email", "password"],
              "properties": {
                "email": { "type": "string", "format": "email" },
                "password": { "type": "string", "format": "password" }
              }
            },
            "SignInResponse": {
              "type": "object",
              "required": ["access_token", "refresh_token", "username", "role"],
              "properties": {
                "access_token": { "type": "string" },
                "refresh_token": { "type": "string" },
                "username": { "type": "string" },
                "role": {
                  "type": "string",
